apiVersion: apps/v1
kind: Deployment
metadata:
  name: market-screener-api
  namespace: market-screener
spec:
  replicas: 1
  selector:
    matchLabels:
      app: market-screener-api
  template:
    metadata:
      labels:
        app: market-screener-api
    spec:
      containers:
        - name: api
          image: market-screener-api:latest
          imagePullPolicy: IfNotPresent
          command: ["uvicorn"]
          args: ["app.main:app", "--host", "0.0.0.0", "--port", "8000"]
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: market-screener-config
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "1"
              memory: "2Gi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 10
