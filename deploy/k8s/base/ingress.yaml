apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: market-screener-ingress
  namespace: market-screener
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "32m"
spec:
  ingressClassName: nginx
  rules:
    - host: api.market-screener.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: market-screener-api
                port:
                  number: 8000
