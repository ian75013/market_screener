# Market Screener production reverse proxy example (Apache2)
#
# Usage:
# 1) Copy this file to /etc/apache2/sites-available/market-screener.conf
# 2) Replace placeholders (__LIKE_THIS__)
# 3) Enable modules and site:
#      sudo a2enmod proxy proxy_http proxy_wstunnel headers rewrite ssl
#      sudo a2ensite market-screener.conf
#      sudo apache2ctl configtest && sudo systemctl reload apache2
#
# Notes:
# - Keep HTTP vhosts for first bootstrap and ACME challenge handling.
# - Once certificates exist, keep redirects enabled and serve traffic on HTTPS.

<VirtualHost *:80>
    ServerName __API_DOMAIN__

    RewriteEngine On
    RewriteRule ^/(.*)$ https://__API_DOMAIN__/$1 [R=301,L]
</VirtualHost>

<VirtualHost *:80>
    ServerName __APP_DOMAIN__

    RewriteEngine On
    RewriteRule ^/(.*)$ https://__APP_DOMAIN__/$1 [R=301,L]
</VirtualHost>

<IfModule mod_ssl.c>
<VirtualHost *:443>
    ServerName __API_DOMAIN__

    SSLEngine on
    SSLCertificateFile /etc/letsencrypt/live/__API_DOMAIN__/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/__API_DOMAIN__/privkey.pem
    Include /etc/letsencrypt/options-ssl-apache.conf

    ProxyPreserveHost On
    ProxyRequests Off
    SSLProxyEngine On
    ProxyTimeout 3600

    ProxyPass        / http://127.0.0.1:__API_HOST_PORT__/ retry=0 timeout=3600
    ProxyPassReverse / http://127.0.0.1:__API_HOST_PORT__/
    RequestHeader set X-Forwarded-Proto "https"
</VirtualHost>

<VirtualHost *:443>
    ServerName __APP_DOMAIN__

    SSLEngine on
    SSLCertificateFile /etc/letsencrypt/live/__APP_DOMAIN__/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/__APP_DOMAIN__/privkey.pem
    Include /etc/letsencrypt/options-ssl-apache.conf

    ProxyPreserveHost On
    ProxyRequests Off
    SSLProxyEngine On
    ProxyTimeout 3600

    ProxyPass        /_stcore/stream ws://127.0.0.1:__APP_HOST_PORT__/_stcore/stream retry=0 timeout=3600
    ProxyPassReverse /_stcore/stream ws://127.0.0.1:__APP_HOST_PORT__/_stcore/stream
    ProxyPass        / http://127.0.0.1:__APP_HOST_PORT__/ retry=0 timeout=3600
    ProxyPassReverse / http://127.0.0.1:__APP_HOST_PORT__/
    RequestHeader set X-Forwarded-Proto "https"
</VirtualHost>
</IfModule>