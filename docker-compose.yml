version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: market-screener-postgres
    environment:
      POSTGRES_DB: market_screener
      POSTGRES_USER: screener_user
      POSTGRES_PASSWORD: screener_password_dev
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U screener_user -d market_screener"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - market-screener-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: market-screener-backend
    environment:
      DATABASE_URL: postgresql+asyncpg://screener_user:screener_password_dev@postgres:5432/market_screener
      PYTHONUNBUFFERED: 1
      ENVIRONMENT: development
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    networks:
      - market-screener-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: market-screener-frontend
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      VITE_API_URL: http://localhost:8000/api/v1
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000', (r) => {if (r.statusCode !== 200) throw new Error(r.statusCode)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    networks:
      - market-screener-network

volumes:
  postgres_data:
    driver: local

networks:
  market-screener-network:
    driver: bridge
